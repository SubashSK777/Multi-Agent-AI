<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <style>
    .orbit { animation: rotate 20s linear infinite; transform-origin: center; }
    .pulse { animation: pulse 2s ease-in-out infinite; }
    .line { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: dash 5s linear infinite; }
    @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes pulse { 0%, 100% { r: 5; opacity: 0.5; } 50% { r: 8; opacity: 1; } }
    @keyframes dash { to { stroke-dashoffset: 0; } }
    text { font-family: 'Segoe UI', sans-serif; fill: #f8fafc; font-size: 12px; }
  </style>
  
  <rect width="800" height="400" fill="#0d1117" rx="15" />
  
  <!-- Central Hub -->
  <circle cx="400" cy="200" r="40" fill="url(#grad1)" class="pulse" />
  <text x="365" y="205" font-weight="bold">NEXUS CORE</text>
  
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6B66FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00D2D3;stop-opacity:1" />
    </linearGradient>
  </defs>

  <g class="orbit">
    <!-- Orbital Nodes -->
    <circle cx="200" cy="200" r="15" fill="#FF6B6B" />
    <text x="160" y="170">Architect</text>
    <path d="M215 200 L360 200" stroke="#FF6B6B" stroke-width="2" class="line" />

    <circle cx="600" cy="200" r="15" fill="#6B66FF" />
    <text x="580" y="170">Ethicist</text>
    <path d="M585 200 L440 200" stroke="#6B66FF" stroke-width="2" class="line" />

    <circle cx="400" cy="50" r="15" fill="#00D2D3" />
    <text x="380" y="30">Sovereign</text>
    <path d="M400 65 L400 160" stroke="#00D2D3" stroke-width="2" class="line" />

    <circle cx="400" cy="350" r="15" fill="#FFD93D" />
    <text x="383" y="385">Oracle</text>
    <path d="M400 335 L400 240" stroke="#FFD93D" stroke-width="2" class="line" />
  </g>
</svg>
